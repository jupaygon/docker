server {
    listen 80;

    # Static landing pages: match "<folder>.zeronet-landings.<anything>"
    server_name ~^(?<folder>[^.]+)\.zeronet-landings;

    # Landings root is the project root (no /public)
    root /var/www/html/$folder;
    index index.html;

    # Use relative redirects so the external port (81) is preserved
    absolute_redirect off;

    # Clean URLs: try exact path, then with .html extension, then as directory
    location / {
        try_files $uri $uri.html $uri/ =404;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|pdf|csv|woff|woff2|ttf|eot)$ {
        expires max;
        log_not_found off;
    }

    client_max_body_size 50M;
}
