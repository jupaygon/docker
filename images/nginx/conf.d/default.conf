server {
    listen 80;

    # Match any "<folder>.<anything>.test"
    server_name ~^(?<folder>[^.]+)\.;

    # Map folder name to workspace folder
    root /var/www/html/$folder/public;
    index index.php index.html;

    # Use relative redirects so the external port (81) is preserved
    absolute_redirect off;

    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass dj_php:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $document_root;

        # Support long-running requests (SSE, streaming endpoints)
        fastcgi_read_timeout 300s;
        fastcgi_buffering off;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires max;
        log_not_found off;
    }

    client_max_body_size 50M;

    # Compress JSON / text responses; saves ~70% on policy-sync style payloads.
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        application/json
        application/javascript
        application/xml
        text/css
        text/plain
        text/xml
        image/svg+xml;
}
